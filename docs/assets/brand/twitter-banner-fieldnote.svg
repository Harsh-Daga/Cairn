  <circle cx="248" cy="398" r="66" fill="none" stroke="#b45a32" stroke-width="3" opacity="0.07"/>

  <!-- header -->
  <text x="152" y="50" font-family="Menlo, monospace" font-size="15" letter-spacing="3" fill="#6b6152">FIELD NOTE #029 · WEEK 29 · JULY 13–19 · SURVEYED LOCALLY</text>

  <!-- headline -->
  <text x="150" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="46" fill="#211c15">The agents spent $412 this week.</text>
  <text x="150" y="168" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="32" fill="#211c15">$97 of it wandered in circles. We flagged the trail.</text>
  <path d="M154 178 C200 172 260 182 330 176 C340 175 348 177 356 176" fill="none" stroke="#b45a32" stroke-width="2" opacity="0.7"/>

  <!-- taped ledger strip -->
  <g transform="rotate(-1.2 700 320)">
    <rect x="330" y="232" width="740" height="168" fill="#fffdf8" stroke="#d8cdb8"/>
    <rect x="360" y="222" width="90" height="24" fill="#e0b45c" opacity="0.35" transform="rotate(-4 405 234)"/>
    <rect x="950" y="222" width="90" height="24" fill="#e0b45c" opacity="0.35" transform="rotate(3 995 234)"/>
    <text x="356" y="278" font-family="Menlo, monospace" font-size="14" fill="#211c15">09:14:02  tool_call   read   src/app.py   4,112 tok   $0.041</text>
    <text x="356" y="316" font-family="Menlo, monospace" font-size="14" fill="#211c15">09:15:31  tool_call   read   src/app.py   4,112 tok   $0.041</text>
    <text x="356" y="354" font-family="Menlo, monospace" font-size="14" fill="#211c15">09:17:58  tool_call   read   src/app.py   4,112 tok   $0.041</text>
    <ellipse cx="700" cy="349" rx="338" ry="21" fill="none" stroke="#b45a32" stroke-width="2.5"/>
    <text x="356" y="388" font-family="Menlo, monospace" font-size="12" fill="#6b6152">… 8 more identical reads this session</text>
  </g>

  <!-- margin annotation -->
  <text x="1108" y="330" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="26" fill="#b45a32" transform="rotate(2 1108 330)">again. AGAIN.</text>
  <path d="M1080 318 C1058 322 1046 332 1038 344" fill="none" stroke="#b45a32" stroke-width="1.5"/>
  <path d="M1038 344 L1046 340 L1044 350 Z" fill="#b45a32"/>

  <!-- wax seal -->
  <g transform="rotate(-6 1340 116)">
    <circle cx="1340" cy="116" r="46" fill="none" stroke="#b45a32" stroke-width="2.5"/>
    <circle cx="1340" cy="116" r="36" fill="none" stroke="#b45a32" stroke-width="1"/>
    <text x="1340" y="122" text-anchor="middle" font-family="Menlo, monospace" font-size="15" letter-spacing="3" fill="#b45a32">CAIRN</text>
  </g>

  <!-- footer -->
  <text x="152" y="452" font-family="Menlo, monospace" font-size="14" fill="#6b6152">cairn — the field journal of machine expeditions · github.com/Harsh-Daga/Cairn</text>
  <text x="152" y="478" font-family="Menlo, monospace" font-size="12" fill="#a89e8b">cost · quality · behavior — zero data leaves basecamp</text>

