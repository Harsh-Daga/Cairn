repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --extra dev ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run --extra dev ruff format --check
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run --extra dev mypy server
        language: system
        pass_filenames: false
