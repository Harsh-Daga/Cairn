<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Session — Cairn</title>
  <link rel="stylesheet" href="/assets/dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/session.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
</head>
<body>
  <div class="session-shell">
    <div class="session-topbar">
      <a href="/" class="session-back"><span class="cairn-glyph" style="width:18px;height:18px"><span class="stone base"></span><span class="stone mid"></span><span class="stone top"></span></span> Dashboard</a>
      <div class="session-topbar-meta" id="session-topbar-meta"></div>
      <button class="session-export" id="btn-export">Export scrubbed HTML</button>
    </div>
    <div class="session-app">
      <aside class="session-left" id="sidebar"></aside>
      <main class="session-center" id="center">
        <div id="autopsy-mount"></div>
      </main>
      <aside class="session-right" id="detail"></aside>
    </div>
  </div>
  <div class="toast-stack" id="toast-stack"></div>
  <div class="chart-tip" id="chart-tip"></div>
  <script src="/assets/session.js"></script>
</body>
</html>
