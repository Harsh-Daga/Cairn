name: Bug report
description: Report a reproducible Cairn bug
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach a Cairn database or raw trace. Remove usernames, absolute paths, prompts,
        repository content, tokens, credentials, and personal data from every field and image.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: What did you expect and what happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run `cairn sync`
        2. Open `/sessions`
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Cairn version
      placeholder: "Output of `cairn --version`"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - uv tool
        - pip
        - wheel
        - source checkout
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: "`cairn doctor --json` output (redact paths/secrets if needed)"
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/screenshots
      description: Paste only the minimal scrubbed terminal output, traceback, or screenshot.

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private traces, prompts, repository content, paths, secrets, and personal data.
          required: true
