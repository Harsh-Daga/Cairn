name: Documentation report
description: Report incorrect, missing, or confusing documentation
title: "[Docs]: "
labels: ["documentation", "needs-triage"]
body:
  - type: input
    id: location
    attributes:
      label: Page or file
      placeholder: docs/getting-started.md or an HTTPS URL
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
      description: Do not include private logs, prompts, credentials, or repository content.
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
