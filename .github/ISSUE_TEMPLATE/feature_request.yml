name: Feature request
description: Propose a Cairn capability or behavior change
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste private traces, prompts, credentials, repository content, or personal data.
        Describe the workflow and use scrubbed examples.
  - type: textarea
    id: problem
    attributes:
      label: Problem and user journey
      description: What are you trying to accomplish, and where does the current workflow fail?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable behavior and any compatibility/privacy constraints.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private logs, secrets, prompts, and repository content.
          required: true
