name: Demo Pages

on:
  # Pages must be enabled in repository settings before deploy is dispatched.
  # Keep deployment opt-in so normal releases do not fail on repositories
  # without a configured Pages site. Pull requests build a preview artifact only.
  workflow_dispatch:
  pull_request:
    paths:
      - "ui/**"
      - "server/export/static.py"
      - "server/demo/**"
      - "scripts/build_ui.py"
      - ".github/workflows/demo-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.12"
  UV_FROZEN: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build UI
        run: uv run python scripts/build_ui.py build

      - name: Seed demo workspace
        run: uv run cairn demo --reset

      - name: Export static snapshot
        run: uv run cairn export --static "_site" --workspace "$HOME/.cairn-demo"

      - name: Verify Pages hosting files
        run: |
          test -f _site/index.html
          test -f _site/.nojekyll
          test -f _site/404.html
          grep -F './assets/' _site/index.html

      - name: Upload preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pages-preview
          path: _site
          retention-days: 7

      - name: Configure Pages
        if: github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

  deploy:
    if: github.event_name == 'workflow_dispatch'
    environment: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
