name: Publish

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  testpypi-dry-run:
    if: startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-rc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build UI
        run: python scripts/build_ui.py

      - name: Build package
        run: uv build

      - name: TestPyPI dry run
        run: uv publish --dry-run --publish-url https://test.pypi.org/legacy/

  publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build UI
        run: python scripts/build_ui.py

      - name: Build package
        run: uv build

      - name: Verify wheel contains UI
        run: |
          unzip -l dist/*.whl | grep -F 'server/static/index.html'

      - name: Publish to PyPI
        run: uv publish
