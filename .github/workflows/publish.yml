name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated semantic-version tag to release
        required: true
        type: string

permissions:
  contents: read

env:
  UV_VERSION: "0.11.12"
  UV_FROZEN: "1"

jobs:
  build:
    name: Build once
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: uv sync --frozen --extra dev
      - run: npm ci
        working-directory: ui
      - name: Validate immutable release identity
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: uv run python scripts/validate_release_tag.py "$RELEASE_TAG"
      - run: uv run python scripts/release_check.py --packaging-only
      - name: Build wheel and sdist once
        run: |
          rm -rf release-artifacts
          mkdir -p release-artifacts/packages release-artifacts/metadata build
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          uv build --out-dir release-artifacts/packages
      - name: Generate runtime SBOM, release notes, and checksums
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          python -m venv build/sbom-venv
          build/sbom-venv/bin/pip install release-artifacts/packages/*.whl
          SITE="$(build/sbom-venv/bin/python -c 'import site; print(site.getsitepackages()[0])')"
          uv run pip-audit --path "$SITE" --format cyclonedx-json \
            --output "release-artifacts/metadata/cairn-${VERSION}.cdx.json"
          uv run python scripts/extract_release_notes.py "$VERSION" \
            "release-artifacts/metadata/release-notes.md"
          cd release-artifacts
          sha256sum packages/* metadata/*.cdx.json > metadata/SHA256SUMS
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release-artifacts/packages/*
            release-artifacts/metadata/SHA256SUMS
            release-artifacts/metadata/*.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: release-artifacts/
          if-no-files-found: error

  verify:
    name: Test exact artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: release-artifacts
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - name: Verify checksums and clean install
        run: |
          cd release-artifacts
          sha256sum --check metadata/SHA256SUMS
          cd ..
          python -m venv verify-venv
          verify-venv/bin/pip install release-artifacts/packages/*.whl
          verify-venv/bin/cairn --version
          HOME="$RUNNER_TEMP/cairn-home" verify-venv/bin/cairn doctor --json
          HOME="$RUNNER_TEMP/cairn-home" verify-venv/bin/cairn demo --reset
          HOME="$RUNNER_TEMP/cairn-home" verify-venv/bin/cairn export \
            --workspace "$RUNNER_TEMP/cairn-home/.cairn-demo" \
            --static "$RUNNER_TEMP/static-export"
          test -f "$RUNNER_TEMP/static-export/index.html"
          test -f "$RUNNER_TEMP/static-export/cairn-data.js"

  publish:
    name: Trusted publish and GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: release-artifacts
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: release-artifacts/packages
          print-hash: true
      - name: Create release from the tested artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          gh release create "$RELEASE_TAG" \
            release-artifacts/packages/* release-artifacts/metadata/* \
            --verify-tag \
            --title "Cairn ${VERSION}" \
            --notes-file release-artifacts/metadata/release-notes.md

  post-publish:
    name: Verify public package
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
    steps:
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install from the public index
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          for attempt in 1 2 3 4 5; do
            if uvx --refresh --from "cairn-workspace==${VERSION}" cairn --version | grep -Fx "$VERSION"; then
              exit 0
            fi
            test "$attempt" -lt 5
            sleep 15
          done
