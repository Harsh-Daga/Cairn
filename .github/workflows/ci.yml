name: CI

on:
  push:
    branches: [main, "v4/**"]
  pull_request:
    branches: [main, "v4/**"]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtualenv and install
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy --strict server

      - name: Pytest
        run: uv run pytest -q

      - name: CDN grep test
        run: uv run pytest -q tests/test_cdn_grep.py

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci || npm install

      - name: Typecheck
        working-directory: ui
        run: npx tsc --noEmit

      - name: Vitest
        working-directory: ui
        run: npm run test

      - name: Build UI
        run: python scripts/build_ui.py

      - name: Check main JS bundle gzip size
        run: |
          ASSETS=server/static/assets
          VENDOR=$(gzip -c "$ASSETS"/vendor-*.js | wc -c | tr -d ' ')
          INDEX=$(gzip -c "$ASSETS"/index-*.js | wc -c | tr -d ' ')
          TOTAL=$((VENDOR + INDEX))
          MAX=$((350 * 1024))
          echo "Gzipped vendor+index: ${TOTAL} bytes (max ${MAX})"
          test "$TOTAL" -le "$MAX"

  integration:
    runs-on: ubuntu-latest
    needs: [python, ui]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Create virtualenv and install
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Set up Node and build UI
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python scripts/build_ui.py

      - name: Verify static UI exists
        run: test -f server/static/index.html
