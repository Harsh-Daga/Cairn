name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.11.12"
  UV_FROZEN: "1"

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy --strict server
      - run: uv run pytest -q --junitxml=test-results/pytest.xml
      - name: Verify generated Python-owned artifacts
        run: |
          uv run python scripts/gen_accuracy.py
          uv run python scripts/gen_cli_docs.py
          git diff --exit-code -- ACCURACY.md server/ingest/accuracy_data.json docs/cli.md
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-${{ matrix.python-version }}-failure
          path: test-results/
          if-no-files-found: ignore

  ui:
    name: UI fast gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: uv sync --frozen --extra dev
      - run: npm ci
        working-directory: ui
      - run: npm run lint
        working-directory: ui
      - run: npm run format:check
        working-directory: ui
      - run: npm run typecheck
        working-directory: ui
      - run: npm test
        working-directory: ui
      - run: npm run check:api
        working-directory: ui
      - run: uv run python scripts/build_ui.py build
      - run: uv run python scripts/check_bundle_size.py
      - run: git diff --exit-code -- ui/src/lib/generated docs/api
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-failure
          path: |
            ui/test-results/
            ui/coverage/
          if-no-files-found: ignore

  coverage:
    name: Branch and changed-line coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      COVERAGE_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: uv python install 3.12
      - run: uv sync --frozen --extra dev --python 3.12
      - run: npm ci
        working-directory: ui
      - name: Python branch coverage
        run: >-
          uv run pytest -q --cov=server --cov-branch
          --cov-report=term
          --cov-report=json:test-results/coverage-python.json
          --cov-report=xml:test-results/coverage-python.xml
          --cov-report=lcov:test-results/coverage-python.lcov
      - name: UI branch coverage
        run: npm run test:coverage
        working-directory: ui
      - name: Enforce observed and changed-line ratchets
        shell: bash
        run: |
          args=()
          if [[ -n "$COVERAGE_BASE" ]] && git cat-file -e "$COVERAGE_BASE^{commit}" 2>/dev/null; then
            args=(--base "$COVERAGE_BASE")
          fi
          uv run python scripts/check_coverage.py "${args[@]}"
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: |
            test-results/coverage-python.*
            ui/coverage/
          if-no-files-found: error

  browser:
    name: Seeded browser journeys
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [python, ui]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: uv sync --frozen --extra dev
      - run: npm ci
        working-directory: ui
      - run: npx playwright install --with-deps chromium firefox webkit
        working-directory: ui
      - run: npm run test:e2e
        working-directory: ui
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-failure
          path: |
            ui/playwright-report/
            ui/test-results/
          if-no-files-found: error

  integration:
    name: Packaging metadata and wheel doctor
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [python, ui]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: uv sync --frozen --extra dev
      - run: npm ci
        working-directory: ui
      # Packaging path only — full quality matrix lives in python/ui jobs + local full release_check.
      - run: uv run python scripts/release_check.py --packaging-only
      - run: uv run python scripts/check_reproducibility.py
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-check-failure
          path: |
            dist/
            build/
          if-no-files-found: ignore
