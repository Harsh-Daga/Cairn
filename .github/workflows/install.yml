name: Install

on:
  pull_request:
    paths:
      - "scripts/install.sh"
      - "install.ps1"
      - "pyproject.toml"
      - "server/**"
      - ".github/workflows/install.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: install-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.11.12"
  UV_FROZEN: "1"

jobs:
  install-unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"

      - name: Build wheel locally
        shell: bash
        run: |
          uv sync --frozen --extra dev
          uv run python scripts/build_ui.py
          uv build
          mkdir -p dist-local
          cp dist/*.whl dist-local/

      - name: Install from local wheel
        shell: bash
        run: |
          WHEEL="$(ls dist-local/*.whl | head -1)"
          uv tool install --force "cairn-workspace@file://${WHEEL}"
          export PATH="$(uv tool dir --bin):$PATH"
          cairn --version
          cairn doctor --json

      - name: Health check after ui start
        shell: bash
        run: |
          export PATH="$(uv tool dir --bin):$PATH"
          cairn ui --no-open --port 8799 &
          sleep 3
          curl -sf http://127.0.0.1:8799/api/health
          kill %1 || true

  install-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"

      - name: Build wheel locally
        shell: bash
        run: |
          uv sync --frozen --extra dev
          uv run python scripts/build_ui.py
          uv build
          mkdir -p dist-local
          cp dist/*.whl dist-local/

      - name: Install from local wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist-local/*.whl | Select-Object -First 1
          uv tool install --force "cairn-workspace@file://$($wheel.FullName)"
          $env:Path = "$(uv tool dir --bin);$env:Path"
          cairn --version
          cairn doctor --json

      - name: Health check after ui start
        shell: pwsh
        run: |
          $env:Path = "$(uv tool dir --bin);$env:Path"
          Start-Process -FilePath cairn -ArgumentList @('ui','--no-open','--port','8799') -WindowStyle Hidden
          Start-Sleep -Seconds 5
          Invoke-RestMethod http://127.0.0.1:8799/api/health
