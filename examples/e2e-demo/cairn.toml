# Sample workspace config for the e2e-demo walkthrough.
# Copy into `<workspace>/.cairn/config.toml` (see setup.sh).
# Release version pin for docs checks (not a config key):
# version = "1.1.1"

[budgets]
min_quality = 0.65
monthly_usd = 50.0

[collection]
mode = "manual"

[storage]
mode = "balanced"
balanced_retain_days = 14

[resources]
# Soft budget only — never deletes. Raise for larger workspaces.
soft_budget_bytes = 524288000
