[project]
name = "cairn"
version = "1.0.0"
description = "A build system for LLM computation over a corpus of files"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "httpx>=0.27",
    "jinja2>=3.1",
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[project.scripts]
cairn = "cairn.cli.main:main"

[dependency-groups]
dev = [
    "httpx>=0.27",
    "jinja2>=3.1",
    "mypy>=1.13",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
    "types-PyYAML>=6.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cairn"]
